pluginManagement {
	repositories {
		maven {
			name = 'Fabric'
			url = 'https://maven.fabricmc.net/'
		}
		mavenCentral()
		gradlePluginPortal()
		maven {
			url = "https://maven.kikugie.dev/snapshots"
			name = "KikuGie Snapshots"
		}
	}
}

plugins {
	id "dev.kikugie.stonecutter" version "0.8+"
}

stonecutter {
	create(getRootProject()) {
		versions("26.1", "26.2")
		vcsVersion = "26.2"
	}
}
